# Default CI — runs on every push / PR.
#
# Keep this job set fast and deterministic (Linux only, no simulator).
# It must catch the kinds of problems that block shipping:
#
#   - Lint / typecheck regressions in the library and example
#   - Broken unit tests (including PagerView wiring regression guard —
#     see src/__tests__/pagerview-wiring.test.ts)
#   - Library `tsc` build produces valid lib/ output
#   - Example metro bundle builds successfully (catches import-time
#     crashes and dependency breakage the library would otherwise ship)
#
# Maestro iOS E2E is NOT part of default CI (too slow, needs macOS runner).
# It lives in `.github/workflows/e2e.yml` and is run manually via
# workflow_dispatch when a PR needs full device-level validation.
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint / Typecheck / Unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install library deps
        run: pnpm install --frozen-lockfile
      - name: Lint (biome)
        run: pnpm lint
      - name: Typecheck (library)
        run: pnpm tsc --noEmit
      - name: Unit test (includes PagerView wiring regression guard)
        run: pnpm test

  build-library:
    name: Build library (tsc)
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install library deps
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Verify lib output exists
        run: test -d lib && ls lib/ && test -f lib/index.d.ts

  build-example:
    name: Build example (metro bundle)
    # Bundling the example app with Metro catches:
    #   - Import-time crashes in the library
    #   - Missing/broken peer deps
    #   - TypeScript errors the library-side tsc wouldn't see
    # This runs on Linux (no iOS simulator needed) so it is cheap and fast.
    runs-on: ubuntu-latest
    needs: build-library
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install library deps
        run: pnpm install --frozen-lockfile
      - name: Build library
        run: pnpm build
      - name: Install example deps
        working-directory: example
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            npm install --legacy-peer-deps
          fi
      - name: Metro bundle (iOS, Release)
        working-directory: example
        run: |
          mkdir -p build
          npx expo export:embed \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output build/main.jsbundle \
            --assets-dest build/assets
      - name: Verify bundle output
        working-directory: example
        run: |
          test -f build/main.jsbundle
          ls -lh build/main.jsbundle
          echo "bundle size: $(du -h build/main.jsbundle | cut -f1)"
